name: Continuous Integration - Java 21

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🛡️ Dar permissão de execução ao Gradle
        uses: chmod +x gradlew

      - name: 🏗️ Build e Testes (Unitários & Testcontainers)
        run: ./gradlew build --no-daemon